<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
    <script src="clicker.js" defer></script>
    <title>JS clicker</title>
</head>
<body>
    <h1>Clicker Game!</h1>
    <div>
        Click the javaScript logo to get cash!
    </div>
    <img alt="JavaScript" width="344" height="390" id="jsImage" src="js.png">
    <!-- credit to https://www.freepnglogos.com/pics/javascript for this image -->
    <h2 id="money">money: 0</h2>
    <section>
        <button id="addButton">
            +1 clicking power - 5$
        </button>
        <button id="multButton">
            x2 clicking power - 25$
        </button>
        <button id="endButton">
            End game! - 500$
        </button>
    </section>
</body>
